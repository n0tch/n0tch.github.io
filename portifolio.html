    <title>Cover Template for Bootstrap</title>

    <!-- Bootstrap core CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="css/cover.css" rel="stylesheet">

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->

  <body>

    <div class="site-wrapper">

      <div class="site-wrapper-inner">

        <div class="cover-container">

          <div class="masthead clearfix">
            <div class="inner">
              <a href="index.html"><h3 class="masthead-brand">Gustavo Oliveira</h3></a>
              <nav>
                <ul class="nav masthead-nav">
                  <li><a href="index.html">Home</a></li>
                  <li class="active"><a href="#">Portifólio</a></li>
                  <li><a href="contato.html">Contato</a></li>
                </ul>
              </nav>
            </div>
          </div>

          <div class="inner cover">
            <div class="row">
              <div class="page-header">
                <h3>Trabalhos</h3>
              </div>
              <div id="carousel" class="carousel slide" data-ride="carousel">
                  <!-- Indicators -->
                  <ol class="carousel-indicators">
                    <li data-target="#carousel" data-slide-to="0" class="active"></li>
                    <li data-target="#carousel" data-slide-to="1"></li>
                    <li data-target="#carousel" data-slide-to="2"></li>
                  </ol>

                  <!-- Wrapper for slides -->
                  <div class="carousel-inner" role="listbox">
                    <div class="item active">
                      <img src="https://dummyimage.com/700x400/000/fff.png" alt="Imagem 1">
                      <div class="carousel-caption">
                        <div class="carousel-caption">
                          <h4>Aplicativo Android</h4>
                          <p>Sons ambientes para RPG de mesa</p>
                        </div>
                      </div>
                    </div>
                    <div class="item">
                      <img src="https://dummyimage.com/700x400/000/fff.png" alt="Imagem 2">
                      <div class="carousel-caption">
                        2
                      </div>
                    </div>
                    <div class="item">
                      <img src="https://dummyimage.com/700x400/000/fff.png" alt="Imagem 2">
                      <div class="carousel-caption">
                        3
                      </div>
                    </div>
                  </div>

                  <!-- Controls -->
                  <a class="left carousel-control" href="#carousel" role="button" data-slide="prev">
                    <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
                    <span class="sr-only">Previous</span>
                  </a>
                  <a class="right carousel-control" href="#carousel" role="button" data-slide="next">
                    <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
                    <span class="sr-only">Next</span>
                  </a>
                </div>
              </div>
            </div>
        
      </div>

    </div>

    <!-- Bootstrap core JavaScript
    ================================================== -->
